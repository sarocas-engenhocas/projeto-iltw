<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faça login no PipocaDigital para aceder à sua conta.">
    <meta name="keywords" content="login, autenticação, conta, pipocadigital">
    <title>Login - PipocaDigital</title>
    <link rel="stylesheet" href="/Static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <script src="components.js"></script>
    <script>injectHeader();</script>
    <div id="main-content" class="head">
            <h1><span class="linha">—</span>LOGIN<span class="linha">—</span></h1>
    </div>


    <div class="login-container">
    <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Email" required>
        <span class="error-message" id="email-error"></span>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Password" required>
        <span class="error-message" id="password-error"></span>
        <button type="submit" class="btn-balde">Login</button>
    </form>
    <p id="message"></p>
    </div>

    <script>injectFooter();</script>
    <script src="login.js"></script>
    
</body>
</html>
