<!-- criarconta.html — Formulário de registo de novo utilizador -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie a sua conta no PipocaDigital e comece a explorar o catálogo de filmes.">
    <meta name="keywords" content="criar conta, registo, pipocadigital">
    <title>Criar Conta - PipocaDigital</title>
    <link rel="icon" href="/pics/PipocaDigitalLogo.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <script src="/js/components.js"></script>
    <script>injectHeader();</script>

    <div id="main-content" class="head">
            <h1><span class="linha">—</span>CRIAR CONTA<span class="linha">—</span></h1>
    </div>

    <div class="login-container">
    <form id="registerForm">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="Nome" required>
        <span class="error-message" id="nome-error"></span>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Email" required>
        <span class="error-message" id="email-error"></span>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Password" required>
        <span class="error-message" id="password-error"></span>
        <label for="confirm-password">Confirmar Password</label>
        <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirmar Password" required>
        <span class="error-message" id="confirm-password-error"></span>
        <button type="submit" class="btn-balde">Criar Conta</button>
    </form>
    <p id="message"></p>
    </div>

    <script>injectFooter();</script>
    <script src="/js/registar.js"></script>
</body>
</html>
